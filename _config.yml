plugins:
  - jekyll-sitemap
  - jekyll-mentions
  - jekyll-paginate

exclude:
  - Rakefile
  - pids
  - Gemfile*

include:
  - .well-known

markdown: kramdown
lang: en

future: true
permalink: pretty
paginate: 150 # Only to have access to paginator.total_posts

jekyll-mentions: https://twitter.com

# Sidebar / chrome content (drives _layouts/default.html "Spine" sidebar)
profile:
  name:     François Monniot
  role:     Software Engineer
  status:   Open to interesting problems
  bio:      Senior software engineer building reliable, distributed cloud systems — messaging, gateways, and the plumbing underneath.
  location: San Francisco, CA
  github:   https://github.com/fmonniot
  github_handle: "@fmonniot"
  # Email split so it can be assembled client-side (anti-scraping)
  email_user:   francois
  email_domain: monniot.eu

author:
    name:     François Monniot
    email:    francois@monniot.eu
    github:   https://github.com/fmonniot
    twitter:  https://twitter.com/fmonniot
    linkedin: https://linkedin.com/in/fmonniot

name: François Monniot
url:  https://francois.monniot.eu

sass:
  style: compressed

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  -
    scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
